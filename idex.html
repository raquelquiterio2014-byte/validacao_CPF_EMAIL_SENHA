<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Validação de Dados</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
    }

    .container {
        background: white;
        padding: 30px;
        border-radius: 15px;
        width: 350px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #4facfe;
        border: none;
        color: white;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #007bff;
    }

    .resultado {
        margin-top: 15px;
        font-weight: bold;
        text-align: center;
    }

    .valido {
        color: green;
    }

    .invalido {
        color: red;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Validação</h2>

    <input type="text" id="cpf" placeholder="CPF (000.000.000-00)">
    <input type="text" id="email" placeholder="E-mail">
    <input type="password" id="senha" placeholder="Senha">

    <button onclick="validar()">Validar</button>

    <div id="resultado" class="resultado"></div>
</div>

<script>
function validarCPF(cpf) {
    if (cpf.length !== 14) return false;
    if (cpf[3] !== '.' || cpf[7] !== '.' || cpf[11] !== '-') return false;

    for (let i = 0; i < cpf.length; i++) {
        if (i !== 3 && i !== 7 && i !== 11) {
            if (cpf[i] < '0' || cpf[i] > '9') {
                return false;
            }
        }
    }
    return true;
}

function validarEmail(email) {
    let arroba = false;
    let ponto = false;

    for (let i = 0; i < email.length; i++) {
        if (email[i] === '@') {
            if (arroba) return false;
            arroba = true;
        }
        if (email[i] === '.') {
            ponto = true;
        }
    }

    if (!arroba || email[0] === '@' || email[email.length - 1] === '@') return false;
    if (!ponto) return false;

    return true;
}

function validarSenha(senha) {
    if (senha.length < 8) return false;

    let temMaiuscula = false;
    let temNumero = false;

    for (let i = 0; i < senha.length; i++) {
        let c = senha[i];

        if (c >= 'A' && c <= 'Z') temMaiuscula = true;
        if (c >= '0' && c <= '9') temNumero = true;
    }

    return temMaiuscula && temNumero;
}

function validar() {
    let cpf = document.getElementById("cpf").value;
    let email = document.getElementById("email").value;
    let senha = document.getElementById("senha").value;

    let resultado = document.getElementById("resultado");

    let msg = "";

    msg += validarCPF(cpf) ? "CPF válido<br>" : "CPF inválido<br>";
    msg += validarEmail(email) ? "E-mail válido<br>" : "E-mail inválido<br>";
    msg += validarSenha(senha) ? "Senha válida<br>" : "Senha inválida<br>";

    resultado.innerHTML = msg;
}
</script>

</body>
</html>
